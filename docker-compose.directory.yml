version: '3.8'

# Directory & Authentication Services
# Protocols covered: ldap, ldaps, radius, kerberos
#
# Usage: docker compose -f docker-compose.directory.yml up -d

services:
  # OpenLDAP - LDAP/LDAPS directory server
  openldap:
    image: osixia/openldap:1.5.0
    container_name: testserver-openldap
    ports:
      - "389:389"       # LDAP
      - "636:636"       # LDAPS
    environment:
      - LDAP_ORGANISATION=Test Organization
      - LDAP_DOMAIN=test.local
      - LDAP_ADMIN_PASSWORD=testpass123
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - testnet

  # FreeRADIUS - RADIUS authentication server
  freeradius:
    image: freeradius/freeradius-server
    container_name: testserver-freeradius
    ports:
      - "1812:1812/udp"   # Authentication
      - "1813:1813/udp"   # Accounting
    volumes:
      - ./docker/freeradius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./docker/freeradius/authorize:/etc/freeradius/mods-config/files/authorize:ro
    command: -X
    mem_limit: 128m
    restart: unless-stopped
    networks:
      - testnet

  # MIT Kerberos KDC
  kerberos:
    build:
      context: ./docker/kerberos
      dockerfile: Dockerfile
    container_name: testserver-kerberos
    ports:
      - "88:88/tcp"
      - "88:88/udp"
    mem_limit: 128m
    restart: unless-stopped
    networks:
      - testnet

networks:
  testnet:
    driver: bridge

volumes:
  openldap_data:
  openldap_config:
