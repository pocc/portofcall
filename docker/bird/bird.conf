# BIRD Internet Routing Daemon - Test Configuration
# Provides BGP protocol endpoint for testing (TCP)
#
# Note: RIP excluded — RIP uses UDP (port 520) which is incompatible
# with Cloudflare Workers' TCP-only connect() API.

log syslog all;

router id 10.0.0.1;

protocol device {
    scan time 10;
}

protocol direct {
    ipv4;
    interface "*";
}

protocol kernel {
    ipv4 {
        export all;
    };
}

# BGP protocol - listens on port 179 (TCP)
protocol bgp testpeer {
    local as 65001;
    neighbor range 0.0.0.0/0 as 65000;
    passive;

    ipv4 {
        import all;
        export all;
    };

    hold time 90;
    keepalive time 30;
}
