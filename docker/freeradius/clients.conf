# FreeRADIUS test client configuration

client localhost {
    ipaddr = 127.0.0.0/8
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# Allow connections from any Docker network host
client dockernet {
    ipaddr = 0.0.0.0/0
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}
