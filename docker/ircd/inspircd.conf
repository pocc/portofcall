<server name="testserver.local"
        description="IRC Test Server for Port of Call"
        network="TestNet">

<admin name="Test Admin"
       nick="admin"
       email="admin@testserver.local">

<bind address="" port="6667" type="clients">

<power diepass="diepass" restartpass="restartpass">

<connect allow="*"
         timeout="900"
         pingfreq="120"
         recvq="8192"
         sendq="262144"
         localmax="3"
         globalmax="3">

<class name="Main"
       pingfreq="120"
       timeout="900"
       recvq="8192"
       sendq="262144">

<files motd="/inspircd/conf/motd.txt"
       rules="/inspircd/conf/rules.txt">

<channels users="20"
          opers="60">

<dns timeout="5">

<options casemapping="rfc1459"
         cyclehosts="yes"
         defaultmodes="nt"
         moronbanner="You are banned."
         allowhalfop="yes">

<security announceinvites="dynamic"
          hidemodes="eI"
          hideulines="no"
          flatlinks="no"
          hidewhois=""
          hidebans="no"
          hidekills=""
          maxtargets="20"
          customversion=""
          operspywhois="no"
          restrictbannedusers="yes"
          genericoper="no"
          userstats="Pu">

<limits maxnick="31"
        maxchan="64"
        maxmodes="20"
        maxident="11"
        maxquit="255"
        maxtopic="307"
        maxkick="255"
        maxgecos="128"
        maxaway="200">

<log method="file" type="*" level="default" target="/inspircd/logs/ircd.log">

<module name="spanningtree">
