# Net-SNMP Agent Configuration for Testing

# Listen on all interfaces (TCP for Workers connect(), UDP for standard tools)
agentAddress udp:161,tcp:161

# SNMPv2c community strings
rocommunity public
rwcommunity private

# System information
sysLocation    Test Lab
sysContact     testuser@test.local
sysName        testserver-snmpd

# System group
sysDescr       Port of Call SNMP Test Agent
sysObjectID    .1.3.6.1.4.1.8072.3.2.10

# Disk monitoring
disk /
