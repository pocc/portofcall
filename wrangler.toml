name = "portofcall"
main = "src/worker/index.ts"
compatibility_date = "2026-02-07"
compatibility_flags = ["nodejs_compat"]

# Custom domain configuration
routes = [
  { pattern = "l4.fyi", custom_domain = true }
]

# Smart Placement: automatically migrates worker execution closer to backend services
[placement]
mode = "smart"

# Asset binding for serving the built React app
[assets]
directory = "./dist"
binding = "ASSETS"

# KV namespace for checklist state
[[kv_namespaces]]
binding = "CHECKLIST"
id = "58bdaee877ab4378815034882860c5c2"

# Observability configuration
[observability.logs]
enabled = true
invocation_logs = true

# Dev-only environment: allows connections to localhost/private IPs for Docker testing.
# Usage: npx wrangler dev --env dev --port 8787
# NEVER deploy with this env — it disables SSRF protection.
[env.dev]
vars = { ALLOW_PRIVATE_HOSTS = "true" }
routes = []

[[env.dev.kv_namespaces]]
binding = "CHECKLIST"
id = "58bdaee877ab4378815034882860c5c2"
